<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自己紹介 - iii
  </title>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #4a90e2;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 800px;
      margin: 30px auto;
      background: #fff;
      padding: 20px 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .profile {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
    }

    .profile-text p {
      margin: 4px 0;
    }

    ul {
      padding-left: 20px;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      color: #777;
      padding: 15px 0 25px;
    }

    @media (max-width: 600px) {
      .profile {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>自己紹介ページ</h1>
  </header>

  <main>
    <section class="profile">
      <!-- アイコン画像を使う場合は src を差し替えてください -->
      <img src="https://via.placeholder.com/120" alt="">
      <div class="profile-text">
        <h2>ぽっし</h2>
        <p>住んでいる場所：東京都</p>
        <p>好きなこと：Web制作・ゲーム・音楽制作 など</p>
      </div>
    </section>

    <section>
      <h2>自己紹介</h2>
      <p>
        ぽっしです。<br>
      </p>
    </section>

    <section>
      <h2>趣味・興味</h2>
      <ul>
        <li>Web制作（HTML / CSS / JavaScript）</li>
        <li>PCゲーム</li>
        <li>音楽制作</li>
        <li>3D制作（Mayaなど）</li>
      </ul>
    </section>

    <section>
      <h2>今取り組んでいること</h2>
      <p>
        ・JavaScript の勉強をしながら、ちょっとしたツールやページを作っています。<br>
        ・デザインやレイアウトも、少しずつ試行錯誤中です。
      </p>
    </section>
  </main>

  <footer>
    &copy; 2026 ぽっし
  </footer>
</body>
</html>
